site_name: Guia de Addons de Minecraft
site_description: Documentação do zero ao avançado para criação de addons.
site_author: Natjllx

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mudar para tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Mudar para tema claro
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Aprender:
    - Início:
      - Introdução: index.md
      - Configuração: docs/aprender/inicio/configuracao.md
      - Estrutura: docs/aprender/inicio/estrutura.md
    - Dominando o JSON:
      - O que é JSON: docs/aprender/json/conceito.md
      - Criando Itens: docs/aprender/json/itens.md
      - Criando Blocos: docs/aprender/json/blocos.md
    - Módulo Intermediário:
      - Modificando Mobs: docs/aprender/intermediario/mobs.md
      - Tabelas de Drops: docs/aprender/intermediario/drops.md
    - Módulo Avançado (Scripts):
      - Introdução ao GameTest: docs/aprender/avancado/gametest.md
      - Criando Eventos: docs/aprender/avancado/eventos.md
