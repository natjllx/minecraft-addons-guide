site_name: Guia de Addons de Minecraft
site_description: Documentação do zero ao avançado para criação de addons.
site_author: Natjllx

theme:
  name: material
  language: pt-BR
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

nav:
  - COMECE AQUI!:
    - index.md
    - O que é um Addon?: comecar/o-que-e.md
    - Requisitos & Instalação: comecar/instalacao.md
    - Estrutura de Pastas: comecar/estrutura.md
    - O que é JSON?: comecar/o-que-e-json.md
  - SEU PRIMEIRO ADDON:
    - Modificando a terra: comecar/seu-primeiro-addon/modificando-a-terra.md
    - Aprofundando o manifest: comecar/seu-primeiro-addon/aprofundando-o-manifest.md
