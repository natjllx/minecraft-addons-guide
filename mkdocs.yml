site_name: Guia de Addons de Minecraft
site_description: Documentação do zero ao avançado para criação de addons.
site_author: Natjllx

theme:
  name: material
  language: pt-BR
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

nav:
  - COMECE AQUI!:
    - index.md
    - O que é um Addon?: comecar/o-que-e.md
    - Requisitos & Instalação: comecar/instalacao.md
    - Estrutura de Pastas: comecar/estrutura.md
    - O que é JSON?: comecar/o-que-e-json.md
  - SEU PRIMEIRO ADDON:
    - Modificando a terra: comecar/seu-primeiro-addon/criando-pasta.md
    - Aprofundando o manifest: comecar/seu-primeiro-addon/entendendo-o-manifest.md
    - Customizando a terra: comecar/seu-primeiro-addon/customizando-a-terra.md
    - Ativação do addon: comecar/seu-primeiro-addon/ativando-addon.md
    - Modificando a Grama (Não é como a Terra!): comecar/seu-primeiro-addon/customizando-a-grama.md
  - MUDANDO O COMPORTAMENTO:
    - Como funciona?: comecar/mudando-o-comportamento/como-funciona.md
    - Creeper mais perigoso!: comecar/mudando-o-comportamento/creeper-mais-perigoso.md
  - CRIANDO O BLOCO:
    - Entendendo algumas coisas: comecar/seu-primeiro-bloco/inicio.md/
