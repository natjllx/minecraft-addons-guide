site_name: Guia de Addons de Minecraft
site_description: Documentação do zero ao avançado para criação de addons.
site_author: Natjllx

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mudar para tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Mudar para tema claro
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

nav:
  - Início: index.md
  
  - 🚀 Primeiros Passos:
    - Bem-vindo ao Mundo dos Addons: introducao/bem-vindo.md
    - Onde tudo acontece (Pastas e Ferramentas): introducao/ambiente.md
    - O Registro de Nascimento do seu Addon: introducao/identidade.md
    - O Casamento Perfeito (Visual vs Lógica): introducao/visual-logica.md

  - 🧱 Moldando o Jogo com JSON:
    - Desmistificando o JSON: json/o-que-e-json.md
    - Criando Objetos (Itens): json/criando-itens.md
    - Erguendo Paredes (Blocos): json/criando-blocos.md
    - Controlando a Mente das Criaturas: json/modificando-mobs.md
    - Recompensas e Receitas: json/recompensas-receitas.md

  - 💻 Dando Vida com Scripts:
    - As Paredes do JSON (Por que ir além?): scripts/limites-json.md
    - Conhecendo o Motor (O que é GameTest?): scripts/gametest.md
    - Ação e Reação (Eventos Inteligentes): scripts/eventos.md
    - Telas e Menus (Interface do Jogador): scripts/interfaces.md
